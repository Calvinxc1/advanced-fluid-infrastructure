name: CI

on:
  pull_request:
    branches: [main, dev]
    types: [opened, reopened, synchronize, edited]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Factorio mod
    runs-on: factorio-headless
    env:
      FACTORIO_BIN: /opt/factorio/bin/x64/factorio

    steps:
      - name: Check out repository
        env:
          CHECKOUT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
          CHECKOUT_REPOSITORY: factorio-modding/advanced-fluid-infrastructure
          GITEA_SERVER_URL: https://gitea.infra.newedenhomestead.net
        run: |
          set -euxo pipefail
          git --version
          git init .
          git remote add origin "$GITEA_SERVER_URL/$CHECKOUT_REPOSITORY.git"
          git fetch --no-tags --depth=1 origin "$CHECKOUT_REF"
          git checkout --force FETCH_HEAD
          git rev-parse HEAD

      - name: Verify validation environment
        run: |
          set -eux
          git --version
          bash --version
          python3 --version
          python3 -c "import yaml; print('pyyaml available')"
          luac -v
          rg --version
          file "$FACTORIO_BIN"
          "$FACTORIO_BIN" --version

      - name: Prepare temporary Factorio mods directory
        run: |
          mods_dir="${RUNNER_TEMP:-/tmp}/factorio-mods"
          mod_name="$(python3 -c 'import json; print(json.load(open("src/info.json", encoding="utf-8"))["name"])')"
          rm -f "$mods_dir/$mod_name"
          mkdir -p "$mods_dir"
          ln -s "$PWD/src" "$mods_dir/$mod_name"
          echo "FACTORIO_MODS_DIR=$mods_dir" >> "$GITHUB_ENV"

      - name: Validate mod
        env:
          AFI_REQUIRE_FACTORIO: "1"
        run: ./scripts/validate.sh
