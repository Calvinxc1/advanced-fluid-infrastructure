[technology-description]
afi_steel-pipe-infrastructure=Unlocks steel pipes with higher pipeline extent and longer underground reach.
afi_steel-pump-infrastructure=Unlocks steel pumps and offshore pumps with higher pumping speed.
afi_steel-pipe-casting=Unlocks foundry casting for steel pipes from molten iron.
afi_low-pressure-steel-pipe-infrastructure=Unlocks steel-stat pipes adapted for space platforms.
afi_low-pressure-steel-pump-infrastructure=Unlocks steel-stat pumps adapted for space platforms.
afi_tungsten-pipe-infrastructure=Unlocks steel-stat tungsten pipes for Vulcanus.
afi_tungsten-pump-infrastructure=Unlocks steel-stat tungsten pumps and lava offshore pumps for Vulcanus.
afi_reinforced-pipe-infrastructure=Unlocks carbon-fiber reinforced pipes with extended pipeline reach and hardened resistances.
afi_reinforced-pump-infrastructure=Unlocks carbon-fiber reinforced pumps and offshore pumps with extended pipeline reach and hardened resistances.
afi_foundation-pipe-infrastructure=Unlocks endgame foundation pipes with beyond-vanilla pipeline extent.
afi_foundation-pump-infrastructure=Unlocks endgame foundation pumps and offshore pumps with high pumping speed.
afi_high-pressure-foundation-pumping=Unlocks promethium-driven foundation pumps for postgame fluid backbone compression.
afi_rubber-lined-pipe-infrastructure=Unlocks rubber-lined pipes with higher pipeline extent and longer underground reach.
afi_rubber-lined-pump-infrastructure=Unlocks rubber-lined pumps and offshore pumps with higher pumping speed.

