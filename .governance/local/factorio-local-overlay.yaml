schema: factorio_local_overlay
schema_version: 1
mod_name: advanced-fluid-infrastructure
canonical_agent_name: Advanced Fluid Infrastructure Factorio Modding Agent
workspace_path: /home/jcherry/Documents/git/factorio-mods/advanced-fluid-infrastructure
metadata_path: src/info.json
namespace_prefixes:
  - afi_
  - __advanced-fluid-infrastructure__/
dependency_stack:
  - base >= 2.0.0
  - space-age >= 2.0.0
optional_dependencies:
  - RampantArsenalFork
upstream_or_fork_source: Standalone staged fluid infrastructure progression for Factorio 2.0 and Space Age.
scope_boundaries:
  - Owns fluid infrastructure prototypes, progression, technologies, recipes, items, entities, and compatibility cleanup.
  - Keep this repository focused on pipes, pipe-to-ground, pumps, offshore pumps, pipeline extent, and fluid infrastructure technologies.
  - Keep unrelated gameplay systems out of this repository unless Jason explicitly approves a scope expansion.
release_target: Factorio 2.0 and Space Age mod version 0.1.0.
changelog_format: Factorio mod portal changelog in src/changelog.txt.
version_policy_path: docs/semantic-versioning.md
release_process_path: docs/release-process.md
contribution_policy_path: CONTRIBUTING.md
validation_available:
  json: true
  lua_syntax: true
  lint: false
  format: false
  factorio_load: true
workspace_specific_rules:
  - Run ./scripts/validate.sh for full local validation when luac, Python, and Factorio validation prerequisites are available.
  - Factorio load validation requires FACTORIO_BIN or a discoverable Factorio binary and a mods-directory symlink from the mod name to src.
  - Use src/info.json as the release version source of truth; main deployment creates a Gitea release and uploads the packaged mod zip to the Factorio mod portal when that version changes on main.
  - Follow docs/semantic-versioning.md before changing src/info.json or preparing release work.
  - Use dev as the long-lived integration branch and main as the release branch.
  - Day-to-day implementation may happen directly on dev until Jason explicitly enables feature branching.
  - Promote dev to main through short-lived release/* branches; do not open recurring dev-to-main pull requests.
  - Keep the top src/changelog.txt Version entry synchronized with src/info.json; scripts/validate.sh enforces this.
  - Keep prototype and locale names under the afi_ prefix unless Jason explicitly approves a namespace migration.
migration_notes:
  - Previous local governance branch was coding-agent with canon coding-agent/1.0.0 and generalized canon trunk/2.7.0.
  - Source branch templates were used only as templates; no top-level lab-governance directory was created.
notes: Local facts are based on src/info.json, README.md, CONTRIBUTING.md, docs/semantic-versioning.md, docs/release-process.md, scripts/validate.sh, scripts/factorio-validate.sh, and existing governance migration evidence.
