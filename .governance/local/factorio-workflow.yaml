schema: factorio_local_workflow
schema_version: 1
mod_name: advanced-fluid-infrastructure
canonical_agent_name: Advanced Fluid Infrastructure Factorio Modding Agent
workspace_path: /home/jcherry/Documents/git/factorio-mods/advanced-fluid-infrastructure
metadata_path: src/info.json
ownership_model: internal_mod
upstream_or_fork_source: Standalone staged fluid infrastructure progression for Factorio 2.0 and Space Age.
namespace_prefixes:
  - afi_
  - __advanced-fluid-infrastructure__/
dependency_stack:
  - base >= 2.0.0
  - space-age >= 2.0.0
optional_dependencies:
  - RampantArsenalFork
scope_boundaries:
  - Owns fluid infrastructure prototypes, progression, technologies, recipes, items, entities, and compatibility cleanup.
  - Keep this repository focused on pipes, pipe-to-ground, pumps, offshore pumps, pipeline extent, and fluid infrastructure technologies.
  - Keep unrelated gameplay systems out of this repository unless Jason explicitly approves a scope expansion.
release_target: Factorio 2.0 and Space Age mod releases.
internal_gitflow_stage: full_gitflow
branch_roles:
  main: Release branch. Main validates on every push and publishes only when src/info.json version changes or public release recovery is needed.
  dev: Long-lived integration branch for completed feature work.
  feature: Short-lived feature/* branches created from dev and merged back to dev.
  release: Short-lived release/* branches created from dev and merged to main.
  hotfix: Short-lived hotfix/* branches created from main for urgent release-line fixes.
release_promotion_path: dev -> release/<version-or-purpose> -> main -> dev
feature_branching_enabled: true
release_branching_enabled: true
main_branch_protection:
  enabled: null
  notes: Branch protection could not be verified through the available connector during the 2026-07-08 full GitFlow transition.
hotfix_flow:
  enabled: true
  branch_pattern: hotfix/<version-or-topic>
  sync_requirements:
    - Merge or cherry-pick hotfix results back to dev after main receives the fix.
    - Evaluate any active release branch for the same fix before closing the hotfix.
post_release_main_to_dev_sync:
  required: true
  mechanism: Manual merge or fast-forward from main back into dev unless validated automation is added later.
  automation_validated: false
  failure_owner: Jason or the acting release agent.
ci_cd_release_gates:
  validation: Pull-request CI validates release branches into main; main push workflow validates main.
  packaging: Main push workflow packages only when release publication is enabled.
  publishing: Main push workflow publishes on src/info.json version bumps and retries missing public destinations for an existing local release.
  post_release_sync: Manual; no validated automation currently records main-to-dev sync.
changelog_process:
  format: Factorio mod portal changelog in src/changelog.txt.
  pending_notes_mechanism: Merge summary must state no player-visible release impact or name the intended changelog bullet/category until a dedicated pending-notes mechanism exists.
  top_version_must_match_metadata: true
validation_available:
  json: true
  lua_syntax: true
  lint: false
  format: false
  factorio_load: true
declared_deviations:
  - Branch protection status is not locally attested yet; verify in Gitea before claiming protected-main enforcement.
workspace_specific_rules:
  - Start ordinary implementation branches from dev as feature/<topic>.
  - Merge feature branches back to dev after review and validation.
  - Cut release branches from dev as release/<version-or-purpose>.
  - Merge release branches to main, then sync main back to dev before starting new ordinary feature work.
  - Do not open recurring dev-to-main pull requests.
  - Do not publish, tag, upload, or create release artifacts outside explicit release work.
migration_notes:
  - Full GitFlow was enabled on 2026-07-08 at Jason's request.
  - Previous local workflow permitted day-to-day maintainer work directly on dev.
last_stage_reviewed_at: 2026-07-08T07:40:00-07:00
known_gaps:
  - Main branch protection status still needs Gitea-side verification.
  - Post-release main-to-dev sync is manual until automation is implemented and validated.
notes: This local workflow file is the repo-specific source of truth for GitFlow stage and branch roles.
