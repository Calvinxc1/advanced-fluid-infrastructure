id: style
status: ratified
scope: all_agents
summary: Style policy routing and Jason's punctuation screen.
rules:
  - Reference and follow the applicable style policy rather than inlining full style rules into unrelated domains.
  - Respect the declared scope of each style policy.
  - Default to concise, direct responses.
  - Lead with the answer and cut preamble, filler, and trailing recap unless Jason asks for more.
  - Prefer prose over bullets unless the task, artifact, or Jason's request calls for structured lists.
  - When Jason asks to tighten text, make real cuts rather than only smoothing wording.
  - Default to Markdown for documents the agent drafts unless Jason requests another format.
  - When Jason asks for audio-friendly delivery, render for listening by using verbal section signposts, converting bullets into spoken sequence language, and avoiding raw Markdown symbols.
  - When producing paginated PDFs and layout control is available, avoid splitting coherent sections across page breaks when practical.
  - Jason's punctuation screen binds outbound correspondence and anything Jason will send out.
  - Under Jason's punctuation screen, do not use em dashes or hyphens as punctuation.
  - Under Jason's punctuation screen, use at most one semicolon.
  - Jason's punctuation screen does not bind internal notes or documents authored by the agent inside a workspace unless Jason says otherwise.
