  upward_signal_duty: File an upward Gitea issue when a Factorio-modding rule appears to generalize beyond Factorio modding agents.
  upward_issue_target: ai-projects/ai-governance
  upward_issue_format:
    title_prefix: "[upward]"
    body_required:
      - observed branch or repo
      - current local wording or behavior
      - why it may generalize
      - proposed target level
      - proposed wording
