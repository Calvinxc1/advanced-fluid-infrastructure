id: agent_governance_update
status: ratified
scope: all_agents
summary: Canonical prompt-driven process for initializing or updating an agent's local governance copy and local status report.
canonical_prompt:
  path: lab-governance/templates/governance-bootstrap-prompt.md
  source_repository: private ai-governance source repository
rules:
  - Agents must use `lab-governance/templates/governance-bootstrap-prompt.md` from the private ai-governance source repository when the canonical bootstrap/update prompt is available.
  - Agents must not improvise governance initialization or update mechanics when the canonical bootstrap/update prompt is available.
  - The prompt path is the source of truth for initialization and update instructions, including branch selection, local status updates, and reconciliation reporting.
  - The bootstrap/update process must preserve `.governance/local/status.yaml` as the portable local governance status report.
  - Completing the prompt does not imply that the legacy central registry has been updated.
  - The prompt must require live feedback about local status changes, branch selection, canon-version changes, and any reconciliation that remains unresolved.
  - The central registry loop is decommissioned as the default live status mechanism; agents must not submit registry attestations unless Jason explicitly requests legacy registry maintenance.
  - Agents must report the ai-governance source commit used for initialization or update.
  - Agents must report the local status path and declared status after initialization or update.
  - Agents must not directly edit the central registry unless Jason explicitly asks for legacy registry maintenance.
prompt_contract:
  - Require or confirm canonical agent name.
  - Require or confirm agent kind.
  - Resolve the active governance branch for that agent.
  - Fetch or inspect the private ai-governance source repository.
  - Copy or merge the correct governance source into the local agent workspace.
  - Preserve local-only governance files unless the prompt explicitly instructs reconciliation.
  - Create or update `.governance/local/status.yaml`.
  - Validate loaded canon versions after update.
  - Compare the new policy state against the local status file and any legacy self-stamp or registry evidence.
  - Provide live reconciliation feedback before and after local mutation.
  - Print a concise closeout summary for the agent to report.
local_status_fields:
  - canonical_agent_name
  - agent_kind
  - active_governance_branch
  - current_active_canon_version
  - current_generalized_canon_version
  - source_repository_or_path
  - governance_source_commit
  - runtime_surface
  - code_authority
  - last_verified_at
  - agent_declared_status
  - notes
failure_rules:
  - If agent identity is not settled, the bootstrap/update must stop before mutating local governance.
  - If a branch or canon-version mismatch is detected, the agent must report the mismatch before local mutation.
  - If local status cannot be created or updated, the agent must report the exact file or permission failure.
  - If local status conflicts with a legacy self-stamp, legacy registry row, or source governance state, the conflict must be reported rather than silently reconciled.
acceptance:
  - The bootstrap/update is locally complete when the local governance copy and `.governance/local/status.yaml` reflect the selected source commit as far as locally attested values allow.
  - Legacy registry maintenance is complete only when Jason explicitly requested it and the requested registry action has been performed or declined with rationale.
