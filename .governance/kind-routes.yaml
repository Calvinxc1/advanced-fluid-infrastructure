id: kind_routes
status: active
kind: coding_agent
default_load:
  - lab-governance/branch-descriptor.yaml
route_resolution:
  - Load default_load after the base task map default_load.
  - Select every kind route that matches the task shape.
  - For each selected kind route, load every file in the named groups plus every direct file listed under files.
  - Do not infer kind policy loading from folder names; route_groups and routes are the explicit kind loading contract.
route_groups:
  coding.planning:
    - lab-governance/policies/plan-mode.yaml
  coding.substantive:
    - lab-governance/policies/code-skepticism.yaml
    - lab-governance/policies/documentation-drift.yaml
  coding.git:
    - lab-governance/policies/gitflow.yaml
    - lab-governance/policies/commit-push-discipline.yaml
  coding.review:
    - lab-governance/policies/code-review.yaml
routes:
  discussion_or_planning:
    groups:
      - coding.planning
    files: []
  substantive_work:
    groups:
      - coding.substantive
    files: []
  git_work:
    groups:
      - coding.git
    files: []
  code_review:
    groups:
      - coding.review
    files: []
